<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Lumière — an elegant wedding budget, guest list and planning tracker." />

        <!-- Preconnect for fastest font loading -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <!-- font-display=swap prevents invisible text (FOIT) and reduces CLS -->
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&family=Inter:wght@600&display=swap&font-display=swap" rel="stylesheet" />

        <title>Lumière · Wedding Budget Tracker</title>

        <!-- AdSense — loaded after fonts so it doesn't compete for bandwidth -->
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1357852677461391" crossorigin="anonymous"></script>

        <style>
          /* Reserve layout space so nothing shifts on load */
          #root { min-height: 100vh; }
          /* Prevent font flash causing CLS */
          html { font-display: swap; }
          /* Contain ad slots so they don't cause layout shifts outside their box */
          .adsbygoogle { contain: layout; }
        </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
